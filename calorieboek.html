function berekenTotalen(basis, factor) {

        const g = (r.gram * factor) / 100;

            kcal: acc.kcal + ing.kcal * g,
            eiwit: acc.eiwit + ing.eiwit * g,
            kh: acc.kh + ing.kh * g,
            vet: acc.vet + ing.vet * g,
        };
    }, { kcal: 0, eiwit: 0, kh: 0, vet: 0 });
}
function recipeTags(recipe) {
    const tags = new Set();
    recipe.basis.forEach((r) => INGREDIENTEN[r.ing].tags.forEach((t) => tags.add(t)));
    return Array.from(tags);
}
function filterRecepten(lijst, uitgesloten) {
    if (!uitgesloten.length) return lijst;
    return lijst.filter((r) => !recipeTags(r).some((t) => uitgesloten.includes(t)));
}
function schaalMaaltijd(recipe, doelKcalMaaltijd) {
    const basis = berekenTotalen(recipe.basis, 1);
    let factor = basis.kcal > 0 ? doelKcalMaaltijd / basis.kcal : 1;
    factor = Math.max(0.6, Math.min(2.2, factor));
    const totaal = berekenTotalen(recipe.basis, factor);
    const ingredienten = recipe.basis.map((r) => ({
        naam: INGREDIENTEN[r.ing].naam,
        gram: Math.round(r.gram * factor),

}

function genereerVoedingsplan(doelKcal, uitgesloten) {
    const ontbijtPool = filterRecepten(RECEPTEN.ontbijt, uitgesloten);
    const lunchPool = filterRecepten(RECEPTEN.lunch, uitgesloten);
    const dinerPool = filterRecepten(RECEPTEN.diner, uitgesloten);
    const snackPool = filterRecepten(RECEPTEN.snack, uitgesloten);
    if (!ontbijtPool.length || !lunchPool.length || !dinerPool.length || snackPool.length < 2) {
        return { leeg: true };
    }
    const dagen = [0, 1, 2].map((i) => {
        const ontbijtRecipe = ontbijtPool[i % ontbijtPool.length];
        const lunchRecipe = lunchPool[i % lunchPool.length];
        const dinerRecipe = dinerPool[i % dinerPool.length];
        const snack1Recipe = snackPool[(i * 2) % snackPool.length];
        const snack2Recipe = snackPool[(i * 2 + 1) % snackPool.length];
        const ontbijt = schaalMaaltijd(ontbijtRecipe, doelKcal * VERDELING.ontbijt);
        const lunch = schaalMaaltijd(lunchRecipe, doelKcal * VERDELING.lunch);
        const diner = schaalMaaltijd(dinerRecipe, doelKcal * VERDELING.diner);
        const snack1 = schaalMaaltijd(snack1Recipe, (doelKcal * VERDELING.snack) / 2);
        const snack2 = schaalMaaltijd(snack2Recipe, (doelKcal * VERDELING.snack) / 2);

            kcal: acc.kcal + m.totaal.kcal,
            eiwit: acc.eiwit + m.totaal.eiwit,
            kh: acc.kh + m.totaal.kh,
            vet: acc.vet + m.totaal.vet,
        }), { kcal: 0, eiwit: 0, kh: 0, vet: 0 });
        return { dag: i + 1, ontbijt, lunch, diner, snacks: [snack1, snack2], totaal };

}
